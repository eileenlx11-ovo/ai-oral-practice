version: "3.8"

services:
  backend:
    build: ./assessment
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./assessment:/app/assessment
      - ./shared:/app/shared

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    volumes:
      - ./voice:/app/voice
      - ./shared:/app/shared
    depends_on:
      - backend
